<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avaliação Biopsicossocial Online Gratuita | Descubra sua Saúde Integral</title>
  <meta name="description" content="Faça a avaliação biopsicossocial gratuita online. 24 perguntas nas dimensões Biológica, Psicológica e Social. Resultado em minutos. Baseado na CIF/OMS." />
  <meta name="keywords" content="avaliação biopsicossocial online, avaliação biopsicossocial gratuita, teste saúde mental, avaliação biopsicossocial INSS, modelo biopsicossocial" />
  <meta name="robots" content="index, follow" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rawline:ital,wght@0,400;0,600;0,700;0,800;0,900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="canonical" href="https://biopsicossocial.com.br/avaliacao" />

  <!-- Schema: avaliação como ferramenta -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Avaliação Biopsicossocial Online",
    "url": "https://biopsicossocial.com.br/avaliacao.html",
    "description": "Avaliação gratuita nas 3 dimensões da saúde biopsicossocial: Biológica, Psicológica e Social. Baseada na CIF/OMS.",
    "applicationCategory": "HealthApplication",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "BRL" },
    "inLanguage": "pt-BR"
  }
  </script>

  <style>
    /* ── Reset e base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F8F9FA; color: #1B1C21;
      min-height: 100vh; overflow-x: hidden;
    }

    /* ── Barra superior ── */
    .av-topbar {
      background: #9B1528;
      border-bottom: 3px solid #FFCD07;
      padding: 10px 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .av-topbar-logo {
      display: flex; align-items: center; gap: 10px;
      font-family: 'Rawline', sans-serif; font-weight: 800;
      font-size: 15px; color: white; text-decoration: none;
      text-transform: uppercase; letter-spacing: .03em;
    }
    .av-topbar-logo-dot {
      width: 32px; height: 32px; background: rgba(255,255,255,.2);
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
    }
    .av-topbar-step { font-size: 12px; color: rgba(255,255,255,.7); }

    /* ── Progress global ── */
    .global-progress-wrapper {
      background: white; border-bottom: 1px solid #DCDDE3; padding: 12px 24px;
      position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }
    .global-progress-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 8px;
    }
    .global-progress-label { font-size: 13px; color: #6E7079; }
    .global-progress-track {
      height: 6px; background: #ECEDEE; border-radius: 99px; overflow: hidden;
    }
    .global-progress-fill {
      height: 100%; background: linear-gradient(90deg, #C41E3A, #1351B4, #168821);
      border-radius: 99px; transition: width .4s ease; width: 0%;
    }

    /* ── Indicadores de dimensão ── */
    .dim-indicators {
      display: flex; gap: 8px; padding: 12px 24px 0;
      justify-content: center;
    }
    .dim-indicator {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 600; padding: 4px 12px;
      border-radius: 99px; border: 1.5px solid #DCDDE3;
      color: #9EA0AA; background: white; transition: all .25s ease;
    }
    .dim-indicator.active {
      border-color: #C41E3A; color: #C41E3A;
      background: #FEF2F2; box-shadow: 0 0 0 3px rgba(196,30,58,.12);
    }
    .dim-indicator.completed {
      border-color: #168821; color: #168821; background: #E3F0E5;
    }
    .dim-indicator.completed::after { content: ' ✓'; }

    /* ── App container ── */
    #assessment-app {
      max-width: 680px; margin: 0 auto; padding: 32px 20px 80px;
    }

    /* ── Question card ── */
    .q-card {
      background: white; border-radius: 16px; padding: 32px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08), 0 8px 24px rgba(0,0,0,.06);
      margin-bottom: 24px;
    }
    .q-dim-header {
      display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
      padding-bottom: 16px; border-bottom: 1px solid #ECEDEE;
    }
    #dim-icon { display: flex; align-items: center; }
    #dim-title {
      font-family: 'Rawline', sans-serif; font-size: 14px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .08em;
    }
    #q-counter {
      margin-left: auto; font-size: 12px; color: #9EA0AA;
      background: #F8F9FA; padding: 3px 10px; border-radius: 99px;
      border: 1px solid #ECEDEE;
    }
    #q-text {
      font-size: 20px; font-weight: 600; line-height: 1.5;
      color: #1B1C21; margin-bottom: 28px; min-height: 64px;
    }

    /* ── Opções ── */
    #options-container { display: flex; flex-direction: column; gap: 10px; }
    .option-btn {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 18px; background: #F8F9FA;
      border: 2px solid #DCDDE3; border-radius: 12px;
      cursor: pointer; text-align: left; font-family: inherit;
      transition: all .18s ease; width: 100%;
    }
    .option-btn:hover {
      border-color: var(--dim-color, #C41E3A);
      background: color-mix(in srgb, var(--dim-color, #C41E3A) 6%, white);
      transform: translateX(4px);
    }
    .option-btn.selected {
      border-color: var(--dim-color, #C41E3A);
      background: color-mix(in srgb, var(--dim-color, #C41E3A) 10%, white);
    }
    .option-number {
      width: 32px; height: 32px; min-width: 32px;
      display: flex; align-items: center; justify-content: center;
      background: white; border: 1.5px solid #DCDDE3; border-radius: 50%;
      font-family: 'Rawline', sans-serif; font-weight: 700; font-size: 14px;
      color: #6E7079; transition: all .18s ease;
    }
    .option-btn.selected .option-number {
      background: var(--dim-color, #C41E3A); color: white;
      border-color: var(--dim-color, #C41E3A);
    }
    .option-btn:hover .option-number {
      border-color: var(--dim-color, #C41E3A);
      color: var(--dim-color, #C41E3A);
    }
    .option-label {
      font-size: 15px; font-weight: 500; color: #333540;
    }

    /* ── Completion ── */
    .completion-screen {
      background: white; border-radius: 20px; padding: 48px 32px;
      text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,.10);
    }
    .completion-icon { font-size: 56px; margin-bottom: 16px; }
    .completion-screen h2 {
      font-family: 'Rawline', sans-serif; font-size: 28px; font-weight: 800;
      color: #1B1C21; margin-bottom: 8px;
    }
    .completion-screen p { color: #6E7079; margin-bottom: 28px; font-size: 16px; line-height: 1.6; }
    .completion-scores-preview {
      display: flex; justify-content: center; gap: 12px;
      margin-bottom: 32px; flex-wrap: wrap;
    }
    .preview-score {
      background: #F8F9FA; border: 1.5px solid #DCDDE3; border-radius: 12px;
      padding: 12px 20px; min-width: 140px; text-align: center;
    }
    .preview-dim { display: block; font-size: 13px; color: #6E7079; margin-bottom: 4px; }
    .preview-num {
      display: block; font-family: 'Rawline', sans-serif;
      font-size: 22px; font-weight: 800; color: var(--c, #C41E3A);
    }
    .email-capture-form {
      display: flex; flex-direction: column; gap: 12px; max-width: 400px; margin: 0 auto;
    }
    .email-capture-form input {
      padding: 14px 16px; border: 1.5px solid #DCDDE3; border-radius: 10px;
      font-size: 15px; font-family: inherit; outline: none; transition: border-color .18s;
    }
    .email-capture-form input:focus { border-color: #C41E3A; box-shadow: 0 0 0 3px rgba(196,30,58,.1); }
    .btn-reveal {
      padding: 16px; background: #C41E3A; color: white; border: none;
      border-radius: 12px; font-family: 'Rawline', sans-serif;
      font-size: 16px; font-weight: 700; cursor: pointer; transition: all .2s;
    }
    .btn-reveal:hover { background: #9B1528; transform: translateY(-2px); box-shadow: 0 4px 16px rgba(196,30,58,.3); }
    .email-note { font-size: 12px; color: #9EA0AA; margin-top: 4px; }

    /* ── Transition overlay ── */
    .dim-transition-overlay {
      position: fixed; inset: 0; display: flex; align-items: center;
      justify-content: center; z-index: 9999; transition: opacity .5s ease;
    }
    .dim-transition-overlay.fade-out { opacity: 0; }
    .dim-transition-content { text-align: center; color: white; padding: 40px; }
    .dim-transition-check {
      font-size: 64px; margin-bottom: 16px;
      animation: popIn .4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes popIn { from { transform: scale(0); } to { transform: scale(1); } }
    .dim-transition-content h3 {
      font-family: 'Rawline', sans-serif; font-size: 24px; font-weight: 800;
      margin-bottom: 8px;
    }
    .dim-transition-content p { opacity: .8; margin-bottom: 12px; }
    .dim-transition-next {
      font-family: 'Rawline', sans-serif; font-size: 20px; font-weight: 700;
      background: rgba(255,255,255,.2); padding: 10px 24px; border-radius: 99px;
      display: inline-block;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      #assessment-app { padding: 20px 12px 80px; }
      .q-card { padding: 20px; }
      #q-text { font-size: 17px; }
      .dim-indicators { flex-wrap: wrap; }
      .completion-scores-preview { flex-direction: column; align-items: center; }
    }
  </style>
</head>
<body>

  <!-- BARRA TOPO -->
  <div class="av-topbar">
    <a href="/" class="av-topbar-logo">
      <div class="av-topbar-logo-dot">
        <svg width="18" height="18" viewBox="0 0 32 32" fill="none">
          <circle cx="16" cy="16" r="6" stroke="white" stroke-width="2"/>
          <circle cx="16" cy="16" r="3" fill="white"/>
        </svg>
      </div>
      Biopsicossocial
    </a>
    <span class="av-topbar-step">Avaliação de Saúde Integral</span>
  </div>

  <!-- PROGRESSO GLOBAL -->
  <div class="global-progress-wrapper">
    <div class="global-progress-header">
      <span id="global-progress-label" class="global-progress-label">0 de 24 perguntas respondidas</span>
    </div>
    <div class="global-progress-track">
      <div id="global-progress-bar" class="global-progress-fill"></div>
    </div>
  </div>

  <!-- INDICADORES DE DIMENSÃO -->
  <div class="dim-indicators">
    <div class="dim-indicator active" id="ind-bio">🔴 Biológica</div>
    <div class="dim-indicator" id="ind-psico">🔵 Psicológica</div>
    <div class="dim-indicator" id="ind-social">🟢 Social</div>
  </div>

  <!-- ASSESSMENT APP -->
  <div id="assessment-app">
    <div class="q-card">
      <div class="q-dim-header">
        <div id="dim-icon"></div>
        <span id="dim-title"></span>
        <span id="q-counter"></span>
      </div>
      <div id="q-text"></div>
      <div id="options-container"></div>
    </div>
  </div>

  <script type="module" src="/src/avaliacao.ts"></script>
</body>
</html>
